apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: my-web-app-container
        image: antonchervets/helloworld1.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "50m"
          limits:
            cpu: "500m"

